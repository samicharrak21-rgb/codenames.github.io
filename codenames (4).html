// ============ Words ============
const WORD_LIST_AR = ["بحر","جبل","نهر","صحراء","غابة","وادي","جزيرة","بركان","شمس","قمر","نجمة","سحابة","مطر","ثلج","ريح","برق","أسد","نمر","فيل","حصان","ذئب","ثعلب","غزال","صقر","نسر","حمامة","بومة","أفعى","حوت","قرش","دلفين","سلحفاة","ملك","أمير","فارس","قلعة","تاج","سيف","درع","رمح","كتاب","قلم","ورقة","مكتبة","مدرسة","جامعة","معلم","طالب","طبيب","مهندس","طيار","بحار","جندي","شرطي","إطفائي","صياد","ساعة","هاتف","حاسوب","كاميرا","مفتاح","مصباح","مرآة","نافذة","باب","جسر","برج","نفق","طريق","ميناء","مطار","محطة","سيارة","قطار","طائرة","سفينة","دراجة","صاروخ","غواصة","مركبة","ذهب","فضة","ماس","لؤلؤ","نحاس","حديد","كنز","خاتم","قهوة","شاي","عسل","خبز","تفاح","عنب","رمان","ليمون","وردة","ياسمين","نخلة","زيتون","قمح","صبار","بستان","حقل","نار","ماء","هواء","تراب","رماد","دخان","بخار","جليد","حلم","ذكرى","خيال","سر","لغز","حكاية","أسطورة","قصة","عاصفة","زلزال","فيضان","إعصار","موجة","صدى","ظل","هدوء","قلب","عين","يد","قدم","ظهر","كتف","إصبع","دماغ","مدينة","قرية","حي","شارع","ساحة","حديقة","متحف","سوق","نقود","بنك","تجارة","سفر","رحلة","خريطة","بوصلة","حقيبة","موسيقى","لحن","طبل","ناي","عود","إيقاع","أغنية","رقص"];
const WORD_LIST_EN = ["Apple","River","Mountain","Cloud","Star","Moon","Sun","Ocean","Forest","Desert","Island","Volcano","Storm","Rain","Snow","Wind","Lion","Tiger","Eagle","Shark","Whale","Wolf","Fox","Bear","Snake","Horse","Falcon","Dolphin","Turtle","Owl","Cat","Dog","King","Queen","Knight","Castle","Crown","Sword","Shield","Spear","Book","Pen","Paper","Library","School","Teacher","Student","Class","Doctor","Engineer","Pilot","Sailor","Soldier","Police","Fireman","Hunter","Clock","Phone","Laptop","Camera","Key","Lamp","Mirror","Window","Door","Bridge","Tower","Tunnel","Road","Port","Airport","Station","Car","Train","Plane","Ship","Bike","Rocket","Sub","Truck","Gold","Silver","Diamond","Pearl","Copper","Iron","Treasure","Ring","Coffee","Tea","Honey","Bread","Grape","Lemon","Orange","Rose","Olive","Palm","Wheat","Cactus","Garden","Field","Fire","Water","Air","Earth","Ash","Smoke","Steam","Ice","Dream","Memory","Secret","Legend","Story","Riddle","Echo","Shadow","Wave","Flood","Hurricane","Tornado","Sound","Light","Dark","Heart","Eye","Hand","Foot","Back","Finger","Brain","Voice","City","Village","Street","Park","Plaza","Museum","Market","House","Money","Bank","Trade","Travel","Journey","Map","Compass","Bag","Music","Drum","Flute","Guitar","Beat","Song","Dance","Stage"];

// ============ Game logic ============
const isAr = (l) => (l ?? "ar") === "ar";
const teamName = (t, l) => isAr(l) ? (t === "red" ? "الفريق الأحمر" : "الفريق الأزرق") : (t === "red" ? "Red Team" : "Blue Team");
const shuffle = (arr) => { const a=[...arr]; for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];} return a; };

function createGame(lang="ar"){
  const list = lang === "en" ? WORD_LIST_EN : WORD_LIST_AR;
  const words = shuffle(list).slice(0,25);
  const startingTeam = Math.random()<0.5 ? "red":"blue";
  const startCount=9, secondCount=8;
  const second = startingTeam==="red" ? "blue":"red";
  const types=[];
  for(let i=0;i<startCount;i++) types.push(startingTeam);
  for(let i=0;i<secondCount;i++) types.push(second);
  for(let i=0;i<7;i++) types.push("neutral");
  types.push("assassin");
  const st = shuffle(types);
  const cards = words.map((w,i)=>({word:w, type:st[i], revealed:false}));
  const startMsg = isAr(lang) ? `يبدأ ${teamName(startingTeam,"ar")}! على القائد إعطاء أول تلميح.` : `${teamName(startingTeam,"en")} starts! The spymaster gives the first clue.`;
  return { cards, startingTeam, turn:startingTeam,
    redRemaining: startingTeam==="red"?startCount:secondCount,
    blueRemaining: startingTeam==="blue"?startCount:secondCount,
    redTotal: startingTeam==="red"?startCount:secondCount,
    blueTotal: startingTeam==="blue"?startCount:secondCount,
    winner:null, phase:"clue", clue:null, guessesLeft:0, lang,
    log:[{kind:"info", text:startMsg, team:startingTeam}] };
}

function giveClue(state, word, count){
  if(state.winner || state.phase!=="clue") return state;
  const clue={word:word.trim(),count,team:state.turn};
  const text = isAr(state.lang) ? `${teamName(state.turn,"ar")}: «${clue.word}» — ${count}` : `${teamName(state.turn,"en")}: "${clue.word}" — ${count}`;
  return {...state, phase:"guess", clue, guessesLeft:count+1, log:[{kind:"clue",team:state.turn,text}, ...state.log]};
}

function revealCard(state, index){
  if(state.winner || state.phase!=="guess") return state;
  const card=state.cards[index]; if(card.revealed) return state;
  const ar=isAr(state.lang);
  const cards=state.cards.map((c,i)=>i===index?{...c,revealed:true}:c);
  let {redRemaining,blueRemaining,turn,guessesLeft}=state; let phase=state.phase; let winner=null;
  const log=[...state.log]; const other = turn==="red"?"blue":"red";
  if(card.type==="assassin"){
    winner=other; phase="over";
    log.unshift({kind:"win",team:winner, text: ar?`${teamName(turn,"ar")} كشف القاتل! فاز ${teamName(winner,"ar")}.`:`${teamName(turn,"en")} hit the assassin! ${teamName(winner,"en")} wins.`});
    return {...state, cards, winner, phase, clue:null, guessesLeft:0, log};
  }
  if(card.type==="red") redRemaining--;
  else if(card.type==="blue") blueRemaining--;
  log.unshift({kind:"guess",team:turn, text: ar
    ? (card.type==="neutral" ? `«${card.word}» محايدة — انتهى دور ${teamName(turn,"ar")}.` : `«${card.word}» لـ${teamName(card.type,"ar")}.`)
    : (card.type==="neutral" ? `"${card.word}" neutral — ${teamName(turn,"en")}'s turn ends.` : `"${card.word}" belongs to ${teamName(card.type,"en")}.`)});
  if(redRemaining===0) winner="red"; if(blueRemaining===0) winner="blue";
  if(winner){ phase="over"; log.unshift({kind:"win",team:winner,text:ar?`فاز ${teamName(winner,"ar")}!`:`${teamName(winner,"en")} wins!`});
    return {...state, cards, redRemaining, blueRemaining, winner, phase, clue:null, guessesLeft:0, log}; }
  if(card.type===turn){
    guessesLeft--;
    if(guessesLeft<=0){ turn=other; phase="clue";
      log.unshift({kind:"turn",team:turn,text: ar?`نفدت التخمينات — دور ${teamName(turn,"ar")}.`:`Out of guesses — ${teamName(turn,"en")}'s turn.`});
      return {...state, cards, redRemaining, blueRemaining, turn, phase, clue:null, guessesLeft:0, log};
    }
    return {...state, cards, redRemaining, blueRemaining, guessesLeft, log};
  }
  turn=other; phase="clue";
  log.unshift({kind:"turn",team:turn,text: ar?`دور ${teamName(turn,"ar")} الآن.`:`Now it's ${teamName(turn,"en")}'s turn.`});
  return {...state, cards, redRemaining, blueRemaining, turn, phase, clue:null, guessesLeft:0, log};
}

function endTurn(state){
  if(state.winner || state.phase!=="guess") return state;
  const ar=isAr(state.lang); const turn = state.turn==="red"?"blue":"red";
  return {...state, turn, phase:"clue", clue:null, guessesLeft:0,
    log:[{kind:"turn",team:turn,text: ar?`أنهى ${teamName(state.turn,"ar")} دوره — دور ${teamName(turn,"ar")}.`:`${teamName(state.turn,"en")} ended their turn — ${teamName(turn,"en")}'s turn.`}, ...state.log]};
}

function pickClue(state, botTeam){
  const ar = (state.lang ?? "ar") === "ar";
  const cats = ar ? AR_CATEGORIES : EN_CATEGORIES;
  const unrevealed = state.cards.filter(c => !c.revealed);
  const own       = unrevealed.filter(c => c.type === botTeam).map(c => c.word);
  const enemy     = unrevealed.filter(c => c.type !== botTeam && c.type !== "assassin").map(c => c.word);
  const assassin  = unrevealed.filter(c => c.type === "assassin").map(c => c.word);

  let best = null; // { word, hits, risk }
  for (const [cat, list] of Object.entries(cats)) {
    const set = new Set(list);
    const hits   = own.filter(w => set.has(w)).length;
    if (hits === 0) continue;
    const eRisk  = enemy.filter(w => set.has(w)).length;
    const aRisk  = assassin.filter(w => set.has(w)).length;
    if (aRisk > 0) continue;             // never give a clue that touches the assassin
    const score  = hits * 10 - eRisk * 4; // prefer many own hits, few enemy collisions
    if (!best || score > best.score) best = { word: cat, hits, eRisk, score };
  }
  if (best) return { word: best.word, count: Math.max(1, Math.min(best.hits, 4)) };

  // Fallback: generic clue with a safe count
  const pool = ar
    ? ["إشارة","رمز","لغز","همسة","خيط","كلمة","فكرة","سر","نسيم"]
    : ["clue","hint","signal","code","spark","trace","echo","wink","vibe"];
  const word = pool[Math.floor(Math.random() * pool.length)];
  const remaining = botTeam === "red" ? state.redRemaining : state.blueRemaining;
  return { word, count: Math.max(1, Math.min(2, remaining)) };
}

function botAction(state, botTeam, difficulty){
  if (state.winner || difficulty === "none") return null;
  if (state.turn !== botTeam) return null;

  if (state.phase === "clue") {
    const { word, count } = pickClue(state, botTeam);
    return { type: "clue", word, count };
  }

  if (state.phase === "guess") {
    const un = state.cards.map((c,i) => ({ c, i })).filter(x => !x.c.revealed);
    if (un.length === 0) return { type: "end" };
    if (state.guessesLeft <= 0) return { type: "end" };

    // The operative MUST guess from words that match the current clue.
    // Look up the clue word in the same category dictionaries the spymaster
    // uses, then only pick from unrevealed board words that belong to that
    // category. This stops the bot from grabbing unrelated own-team words.
    const ar = (state.lang ?? "ar") === "ar";
    const cats = ar ? AR_CATEGORIES : EN_CATEGORIES;
    const clueWord = (state.clue?.word ?? "").trim();
    const categoryWords = cats[clueWord] ? new Set(cats[clueWord]) : null;

    const inClue = categoryWords
      ? un.filter(x => categoryWords.has(x.c.word))
      : [];

    // If we've already used up the intended count, end the turn (no bonus guess
    // unless we're very confident — and we can't be confident without semantics).
    const intended = state.clue?.count ?? 1;
    const used = intended + 1 - state.guessesLeft; // 0-indexed guesses spent
    if (used >= intended) return { type: "end" };

    if (inClue.length) {
      if (difficulty === "hard") {
        // Hard bot prefers its own team's cards from inside the clue category.
        const ownInClue = inClue.filter(x => x.c.type === botTeam);
        if (ownInClue.length) {
          return { type: "guess", index: ownInClue[Math.floor(Math.random()*ownInClue.length)].i };
        }
        // No own card in this category — be cautious and bail out.
        return { type: "end" };
      }
      // Easy bot: random pick from the clue category (may be wrong).
      return { type: "guess", index: inClue[Math.floor(Math.random()*inClue.length)].i };
    }

    // Clue we don't understand (player-typed online, or fallback clue):
    // pass the turn rather than blindly grabbing a card. Falls back to a
    // safe random pick only on easy difficulty.
    if (difficulty === "hard") return { type: "end" };
    const safe = un.filter(x => x.c.type !== "assassin");
    const pool = safe.length ? safe : un;
    return { type: "guess", index: pool[Math.floor(Math.random()*pool.length)].i };
  }

  return null;
}

function genCode(){ const c="ABCDEFGHJKLMNPQRSTUVWXYZ23456789"; let s=""; for(let i=0;i<5;i++) s+=c[Math.floor(Math.random()*c.length)]; return s; }
async function createRoom(hostId, lang="ar"){
  for(let i=0;i<6;i++){
    const code=genCode();
    const { error } = await supabase.from("rooms").insert({ code, state:createGame(lang), status:"lobby", host_id:hostId });
    if(!error) return code;
  }
  throw new Error("Could not create room");
}

async function leaveRoom(code, playerId){ await supabase.from("room_players").delete().eq("room_code",code).eq("player_id",playerId); }

// ============ Chat (broadcast) ============
function joinChat(code, onMessage){
  const channel = supabase.channel(`chat-${code}`, { config:{ broadcast:{ self:true } } });
  channel.on("broadcast", { event:"msg" }, (p)=>{ const m=p.payload; if(m?.id) onMessage(m); });
  channel.subscribe();
  const send = (msg)=>{
    const full={...msg, id:uuid(), created_at:new Date().toISOString(), text:msg.text.trim().slice(0,300)};
    if(!full.text) return;
    channel.send({type:"broadcast", event:"msg", payload:full});
  };
  return { channel, send };
}

// ============ Hash router ============
function useHashRoute(){
  const [hash,setHash] = useState(()=> window.location.hash || "#/");
  useEffect(()=>{
    const on = ()=> setHash(window.location.hash || "#/");
    window.addEventListener("hashchange", on);
    return ()=> window.removeEventListener("hashchange", on);
  },[]);
  const nav = (h, replace=false)=>{
    if(replace) window.location.replace("#"+h);
    else window.location.hash = h;
  };
  return [hash, nav];
}
function parseRoute(hash){
  const h = hash.replace(/^#/, "");
  if(h==="" || h==="/") return {name:"home"};
  if(h==="/play") return {name:"play"};
  if(h==="/terms") return {name:"terms"};
  const m = h.match(/^\/room\/([^/]+)/);
  if(m) return {name:"room", code: decodeURIComponent(m[1])};
  return {name:"home"};
}
function Link({to, children, className, ...rest}){
  const onClick=(e)=>{ e.preventDefault(); window.location.hash = to; };
  return <a href={"#"+to} onClick={onClick} className={className} {...rest}>{children}</a>;
}

function Board({state, spymasterView, canGuess, onReveal}){
  const { sound } = useSettings();
  const lastRev = useRef(state.cards.filter(c=>c.revealed).length);
  useEffect(()=>{
    const now = state.cards.filter(c=>c.revealed).length;
    if(now>lastRev.current){
      const last = [...state.cards].reverse().find(c=>c.revealed);
      if(last){
        if(last.type==="assassin"){ if(sound) Sounds.assassin(); window.__cnFx?.shake(); }
        else if(sound){ if(last.type==="neutral") Sounds.bad(); else Sounds.good(); }
      }
    }
    lastRev.current = now;
  },[state.cards, sound]);
  const prevWin = useRef(state.winner);
  useEffect(()=>{ if(state.winner && state.winner!==prevWin.current){ if(sound) Sounds.win(); window.__cnFx?.confetti(); } prevWin.current=state.winner; },[state.winner, sound]);
  return <div className="grid grid-cols-5 gap-1.5 sm:gap-3">
    {state.cards.map((c,i)=>(
      <Card key={i} card={c} spymasterView={spymasterView} canGuess={canGuess}
        onClick={()=>{ if(sound) Sounds.flip(); onReveal(i); }}/>
    ))}
  </div>;
}

function ClueBar({state, isSpymaster, myTeamTurn, onClue, onEndTurn}){
  const { t } = useSettings();
  const [word,setWord]=useState(""); const [count,setCount]=useState(1); const [err,setErr]=useState("");
  if(state.winner) return null;
  const submit=()=>{
    const w=word.trim(); if(!w) return;
    if(/\s/.test(w)){ setErr(t("clueRuleSingleWord")); return; }
    const norm=w.toLowerCase();
    if(state.cards.some(c=>c.word.toLowerCase()===norm)){ setErr(t("clueRuleNoBoardWord")); return; }
    setErr(""); onClue(w,count); setWord(""); setCount(1);
  };
  if(state.phase==="clue"){
    if(isSpymaster && myTeamTurn){
      return <div className="rounded-2xl border-2 border-border bg-card p-3 shadow-card">
        <div className="flex flex-wrap items-center gap-2">
          <span className="flex items-center gap-1 font-display text-base"><Brain className="h-5 w-5"/> {t("yourClue")}:</span>
          <input value={word} onChange={e=>{setWord(e.target.value);setErr("");}} onKeyDown={e=>e.key==="Enter"&&submit()} placeholder={t("oneWord")} className="min-w-0 flex-1 rounded-xl border-2 border-border bg-background px-3 py-2 font-bold outline-none focus:border-primary"/>
          <select value={count} onChange={e=>setCount(Number(e.target.value))} className="rounded-xl border-2 border-border bg-background px-3 py-2 font-bold outline-none focus:border-primary">
            {Array.from({length:9},(_,i)=>i+1).map(n=><option key={n} value={n}>{n}</option>)}
          </select>
          <button onClick={submit} className="flex items-center gap-2 rounded-xl bg-primary px-5 py-2 font-display text-base text-primary-foreground border-b-4 border-[#d94f4f] active:translate-y-0.5">{t("send")} <Send className="h-4 w-4"/></button>
        </div>
        {err && <p className="mt-2 text-sm font-bold text-destructive">{err}</p>}
      </div>;
    }
    return <div className="flex items-center justify-center gap-2 rounded-2xl border-2 border-dashed border-border bg-card/70 p-4 text-center font-display text-base text-muted-foreground">
      <Hourglass className="h-5 w-5 animate-wiggle"/> {t("waitingClue")} {state.turn==="red"?t("red"):t("blue")}...
    </div>;
  }
  return <div className="flex flex-wrap items-center justify-between gap-3 rounded-2xl border-2 border-border bg-card p-3 shadow-card">
    <div className="flex items-center gap-2">
      <Megaphone className="h-5 w-5"/>

      <span className="rounded-xl bg-accent px-3 py-1 font-display text-lg text-accent-foreground">{state.clue?.word} — {state.clue?.count}</span>
      <span className="text-sm font-bold text-muted-foreground">({Math.max(state.guessesLeft,0)} {t("guessesLeft")})</span>
    </div>
    {!isSpymaster && myTeamTurn && (

    )}
  </div>;
}

function PlayLocal(){
  const { t, lang, sound } = useSettings();
  const [state,setState]=useState(()=>createGame(lang));
  const [difficulty,setDifficulty]=useState("hard");
  const [myTeam,setMyTeam]=useState("red");
  // The bot is ALWAYS the user's spymaster in local play — the user only ever
  // plays as an operative. The spymaster ("spy") view is never exposed, so the
  // player cannot peek at the solution.
  const botMate = true;
  const spy = false;
  const opponent = myTeam==="red"?"blue":"red";
  const actorIsBot = (s)=>{ if(s.winner) return false; if(s.turn===opponent) return true; if(s.phase==="clue") return botMate; return false; };
  const stateRef=useRef(state); stateRef.current=state;
  useEffect(()=>{
    if(!actorIsBot(state)) return;
    const t=setTimeout(()=>{
      const cur=stateRef.current; const a=botAction(cur,cur.turn,difficulty);
      if(!a) return;
      if(a.type==="clue") setState(s=>giveClue(s,a.word,a.count));
      else if(a.type==="guess") setState(s=>revealCard(s,a.index));
      else if(a.type==="end"){ setState(s=>endTurn(s)); if(sound) Sounds.turn(); }
    },900);
    return ()=>clearTimeout(t);
  },[state,difficulty,myTeam,sound]);
  useEffect(()=>{ setState(createGame(lang)); },[lang]);
  const newGame=()=>{ setState(createGame(lang)); };
  const myTeamTurn = state.turn===myTeam;
  const humanIsSpymaster = false; // user can never be spymaster locally
  const humanIsOperative = state.phase==="guess" && myTeamTurn;
  return <div className="mx-auto max-w-4xl px-4 py-5">
    <header className="mb-4 flex items-center justify-between gap-2">
      <Link to="/" className="flex items-center gap-1 font-display text-2xl text-primary"><Home className="h-5 w-5"/> {t("appName")}</Link>
      <div className="flex flex-wrap items-center gap-2">
        <SettingsButton/>
        <button onClick={newGame} className="flex items-center gap-1.5 rounded-xl bg-primary px-3 py-2 font-display text-sm text-primary-foreground border-b-4 border-[#d94f4f] active:translate-y-0.5"><RefreshCw className="h-4 w-4"/> {t("newGame")}</button>
      </div>
    </header>
    <div className="mb-4 grid gap-3 rounded-2xl border-2 border-border bg-card p-3 shadow-card sm:grid-cols-2">
      <label className="flex flex-col gap-1 text-sm">
        <span className="flex items-center gap-1 font-bold"><Users className="h-4 w-4"/> {t("yourTeam")}</span>
        <div className="flex gap-2">
          {["red","blue"].map(tt=>(
            <button key={tt} onClick={()=>setMyTeam(tt)} className={`flex-1 rounded-xl border-b-4 px-3 py-2 font-display text-sm transition ${myTeam===tt?(tt==="red"?"bg-team-red text-team-red-foreground border-[#d94f4f]":"bg-team-blue text-team-blue-foreground border-[#3a78d6]"):"bg-background border-border text-foreground/70"}`}>{tt==="red"?t("red"):t("blue")}</button>
          ))}
        </div>
      </label>
      <label className="flex flex-col gap-1 text-sm">
        <span className="font-bold">{t("difficulty")}</span>
        <select value={difficulty} onChange={e=>setDifficulty(e.target.value)} className="rounded-xl border-2 border-border bg-background px-3 py-2 font-bold">
          <option value="easy">{t("easyBots")}</option>
          <option value="hard">{t("hardBots")}</option>
        </select>
      </label>
    </div>
    <div className="mb-3 flex items-center justify-center gap-2 rounded-xl border-2 border-dashed border-border bg-card/70 px-3 py-2 text-sm text-muted-foreground"><Bot className="h-4 w-4"/> {t("botSpymasterDesc")}</div>
    <ScoreHud state={state}/>
    {state.winner && <div className={`my-3 animate-pop flex items-center justify-center gap-2 rounded-2xl border-b-4 p-4 text-center font-display text-2xl ${state.winner==="red"?"bg-team-red text-team-red-foreground border-[#d94f4f]":"bg-team-blue text-team-blue-foreground border-[#3a78d6]"}`}><Trophy className="h-7 w-7"/> {t("won")} {state.winner==="red"?t("red"):t("blue")}!</div>}
    <div className="my-3">
      <ClueBar state={state} isSpymaster={humanIsSpymaster} myTeamTurn={myTeamTurn}
        onClue={(w,c)=>setState(s=>giveClue(s,w,c))} onEndTurn={()=>setState(s=>endTurn(s))}/>
    </div>
    <Board state={state} spymasterView={false} canGuess={humanIsOperative} onReveal={(i)=>setState(s=>revealCard(s,i))}/>
    <p className="mt-3 text-center text-xs text-muted-foreground">{t("rulesShort")}</p>
    <div className="mt-4"><GameLog state={state}/></div>
    <p className="mt-3 text-center text-xs text-muted-foreground">{t("developer")}</p>
  </div>;
}

// ============ Room (identity + lobby + game) ============
function Centered({children}){ return <div className="flex min-h-screen items-center justify-center px-6 text-center font-display text-2xl">{children}</div>; }

function IdentityGate({onReady}){
  const { t } = useSettings();
  const existing = getIdentity();
  const [name,setName]=useState(existing?.name??"");
  const [avatar,setAvatar]=useState(existing?.avatar??0);
  const Av = avatarOf(avatar).icon;
  return <div className="mx-auto flex min-h-screen max-w-md flex-col items-center justify-center px-6 text-center">
    <div style={{background:avatarOf(avatar).bg}} className="animate-float flex h-20 w-20 items-center justify-center rounded-3xl text-white shadow-pop"><Av className="h-10 w-10"/></div>
    <h1 className="mt-3 font-display text-4xl">{t("whoAreYou")}</h1>
    <p className="mt-1 text-muted-foreground">{t("pickNameAvatar")}</p>
    <input value={name} onChange={e=>setName(e.target.value)} placeholder={t("yourName")} maxLength={16} className="mt-5 w-full rounded-2xl border-2 border-border bg-card px-4 py-3 text-center font-bold outline-none focus:border-primary"/>
    <div className="mt-4 grid grid-cols-6 gap-2">
      {AVATARS.map((a,i)=>{ const Icon=a.icon; return (
        <button key={i} onClick={()=>setAvatar(i)} style={{background:a.bg}} className={`flex h-12 w-12 items-center justify-center rounded-2xl text-white transition-transform ${avatar===i?"scale-110 ring-4 ring-foreground/30":"opacity-80 hover:scale-105"}`}><Icon className="h-6 w-6"/></button>
      ); })}
    </div>
    <button disabled={!name.trim()} onClick={()=>onReady(saveIdentity(name.trim(),avatar))} className="mt-6 flex w-full items-center justify-center gap-2 rounded-2xl bg-primary px-6 py-3 font-display text-xl text-primary-foreground border-b-4 border-[#d94f4f] disabled:opacity-50 active:translate-y-1">{t("letsGo")} <Play className="h-5 w-5"/></button>
  </div>;
}

function Lobby({code, room, players, me, isHost, onTeamRole, onStart, onLeave, identity}){
  const { t } = useSettings();
  const [copied,setCopied]=useState(false);
  const teamPlayers = team => players.filter(p=>p.team===team);
  const hasSpy = team => teamPlayers(team).some(p=>p.role==="spymaster");
  const canStart = hasSpy("red") && hasSpy("blue") && teamPlayers("red").length>=2 && teamPlayers("blue").length>=2;
  const copy = ()=>{ navigator.clipboard?.writeText(window.location.href); setCopied(true); setTimeout(()=>setCopied(false),1500); };
  return <div className="mx-auto max-w-3xl px-4 py-6">
    <header className="mb-4 flex items-center justify-between gap-2">
      <Link to="/" className="flex items-center gap-1 font-display text-2xl text-primary"><Home className="h-5 w-5"/> {t("appName")}</Link>
      <div className="flex items-center gap-2">
        <SettingsButton/>
        <button onClick={onLeave} className="flex items-center gap-1 rounded-xl bg-card px-3 py-2 text-sm font-bold border-b-4 border-border"><LogOut className="h-4 w-4"/> {t("exit")}</button>
      </div>
    </header>
    <div className="rounded-3xl border-2 border-border bg-card p-5 text-center shadow-pop">
      <p className="text-muted-foreground">{t("roomCode")}</p>
      <div className="mt-1 flex items-center justify-center gap-3">
        <span className="font-display text-5xl tracking-[0.3em]">{code}</span>
        <button onClick={copy} className="flex items-center gap-1 rounded-xl bg-secondary px-3 py-2 text-sm font-bold text-secondary-foreground border-b-4 border-[#39b3aa]">
          {copied?<><Check className="h-4 w-4"/> {t("copied")}</>:<><Copy className="h-4 w-4"/> {t("copy")}</>}
        </button>
      </div>
    </div>
    <h2 className="mt-6 mb-2 text-center font-display text-2xl">{t("chooseTeam")}</h2>
    <div className="grid gap-4 sm:grid-cols-2">
      {["red","blue"].map(team=>(
        <div key={team} className={`rounded-3xl border-2 p-4 ${team==="red"?"border-team-red bg-team-red-soft":"border-team-blue bg-team-blue-soft"}`}>
          <h3 className="mb-3 text-center font-display text-xl">{team==="red"?t("red"):t("blue")}</h3>
          <div className="space-y-2">
            {teamPlayers(team).map(p=>{ const av=avatarOf(p.avatar); const Icon=av.icon; return (
              <div key={p.id} className="flex items-center gap-2 rounded-xl bg-card/80 px-3 py-2">
                <span style={{background:av.bg}} className="flex h-8 w-8 items-center justify-center rounded-lg text-white"><Icon className="h-4 w-4"/></span>
                <span className="font-bold">{p.name}</span>
                <span className="ms-auto text-sm">{p.role==="spymaster"?t("spymaster"):t("operative")}</span>
              </div>
            ); })}
            {teamPlayers(team).length===0 && <p className="py-2 text-center text-sm text-muted-foreground">{t("noOneYet")}</p>}
          </div>
          <div className="mt-3 flex gap-2">
            <button onClick={()=>onTeamRole(team,"spymaster")} disabled={!!me && me.team===team && me.role==="spymaster"} className="flex-1 rounded-xl bg-card px-3 py-2 text-sm font-bold border-b-4 border-border disabled:opacity-50">{t("joinAsSpymaster")}</button>
            <button onClick={()=>onTeamRole(team,"operative")} disabled={!!me && me.team===team && me.role==="operative"} className="flex-1 rounded-xl bg-card px-3 py-2 text-sm font-bold border-b-4 border-border disabled:opacity-50">{t("joinAsOperative")}</button>
          </div>
        </div>
      ))}
    </div>
    <div className="mt-6"><RoomChat code={code} playerId={identity.playerId} name={identity.name} avatar={identity.avatar}/></div>
    <div className="mt-6 text-center">
      {isHost ? <>
        <button onClick={onStart} disabled={!canStart} className="inline-flex items-center gap-2 rounded-2xl bg-primary px-10 py-4 font-display text-xl text-primary-foreground border-b-4 border-[#d94f4f] disabled:opacity-50 active:translate-y-1"><Play className="h-5 w-5"/> {t("startGame")}</button>
        {!canStart && <p className="mt-2 text-sm text-muted-foreground">{t("needMinPlayers")}</p>}
      </> : <p className="font-display text-lg text-muted-foreground">{t("waitingHost")}</p>}
    </div>
    <p className="mt-6 text-center text-xs text-muted-foreground">{t("developer")}</p>
  </div>;
}

function PlayOnline({code, room, me, isHost, onBackToLobby, onLeave, identity}){
  const { t } = useSettings();
  const state = room.state;
  const isSpymaster = me?.role==="spymaster";
  const myTeamTurn = !!me?.team && me.team===state.turn;
  const push = (next)=>{ updateRoomState(code,next,"playing"); };
  const meAv = me?avatarOf(me.avatar):null; const MeIcon = meAv?.icon;
  return <div className="mx-auto max-w-4xl px-4 py-5">
    <header className="mb-3 flex flex-wrap items-center justify-between gap-2">
      <Link to="/" className="flex items-center gap-1 font-display text-xl text-primary"><Home className="h-5 w-5"/> {t("appName")}</Link>
      <div className="flex flex-wrap items-center gap-2 text-sm">
        {me && MeIcon && <span className="flex items-center gap-1 rounded-xl bg-card px-2 py-1 font-bold border-b-4 border-border">
          <span style={{background:meAv.bg}} className="flex h-6 w-6 items-center justify-center rounded text-white"><MeIcon className="h-3.5 w-3.5"/></span>
          {me.name} · {me.role==="spymaster"?t("spymaster"):t("operative")} · {me.team==="red"?t("red"):me.team==="blue"?t("blue"):""}
        </span>}
        {isHost && state.winner && <button onClick={onBackToLobby} className="flex items-center gap-1 rounded-xl bg-secondary px-3 py-2 font-bold text-secondary-foreground border-b-4 border-[#39b3aa]"><RefreshCw className="h-4 w-4"/> {t("newGame")}</button>}
        <SettingsButton/>
        <button onClick={onLeave} className="flex items-center gap-1 rounded-xl bg-card px-3 py-2 font-bold border-b-4 border-border"><LogOut className="h-4 w-4"/> {t("exit")}</button>
      </div>
    </header>
    <ScoreHud state={state}/>
    {state.winner && <div className={`my-3 animate-pop flex items-center justify-center gap-2 rounded-2xl border-b-4 p-4 text-center font-display text-2xl ${state.winner==="red"?"bg-team-red text-team-red-foreground border-[#d94f4f]":"bg-team-blue text-team-blue-foreground border-[#3a78d6]"}`}><Trophy className="h-7 w-7"/> {t("won")} {state.winner==="red"?t("red"):t("blue")}!</div>}
    <div className="my-3"><ClueBar state={state} isSpymaster={!!isSpymaster} myTeamTurn={myTeamTurn} onClue={(w,c)=>push(giveClue(state,w,c))} onEndTurn={()=>push(endTurn(state))}/></div>
    <div className="grid gap-4 lg:grid-cols-[1fr_20rem]">
      <div>
        <Board state={state} spymasterView={!!isSpymaster} canGuess={!isSpymaster && myTeamTurn && state.phase==="guess"} onReveal={(i)=>push(revealCard(state,i))}/>
        <div className="mt-4"><GameLog state={state}/></div>
      </div>
      <aside><RoomChat code={code} playerId={identity.playerId} name={identity.name} avatar={identity.avatar}/></aside>
    </div>
    <p className="mt-4 text-center text-xs text-muted-foreground">{t("developer")}</p>
  </div>;
}

function RoomInner({code, identity}){
  const { t, lang } = useSettings();
  const [room,setRoom]=useState(null); const [players,setPlayers]=useState([]); const [missing,setMissing]=useState(false);
  const joined = useRef(false);
  const refreshPlayers = useCallback(()=>{ listPlayers(code).then(setPlayers); },[code]);
  useEffect(()=>{
    let active=true;
    (async()=>{
      const r = await getRoom(code);
      if(!active) return;
      if(!r){ setMissing(true); return; }
      setRoom(r);
      if(!joined.current){ joined.current=true; await joinRoomDB(code, identity.playerId, identity.name, identity.avatar); }
      refreshPlayers();
    })();
    return ()=>{ active=false; };
  },[code, identity, refreshPlayers]);
  useEffect(()=>{
    const ch = supabase.channel(`room-${code}`)
      .on("postgres_changes",{event:"*",schema:"public",table:"rooms",filter:`code=eq.${code}`},(p)=>{
        if(p.eventType==="DELETE") setMissing(true); else setRoom(p.new);
      })
      .on("postgres_changes",{event:"*",schema:"public",table:"room_players",filter:`room_code=eq.${code}`}, refreshPlayers)
      .subscribe();
    return ()=>{ supabase.removeChannel(ch); };
  },[code, refreshPlayers]);
  useEffect(()=>{
    const on = ()=> leaveRoom(code, identity.playerId);
    window.addEventListener("beforeunload", on);
    return ()=> window.removeEventListener("beforeunload", on);
  },[code, identity.playerId]);
  if(missing) return <Centered><div>
    <LogOut className="mx-auto h-12 w-12 text-muted-foreground"/>
    <p className="mt-3">{t("roomMissing")}</p>
    <Link to="/room/new" className="mt-4 inline-block rounded-2xl bg-primary px-6 py-3 text-lg text-primary-foreground border-b-4 border-[#d94f4f]">{t("createNewRoom")}</Link>
  </div></Centered>;
  if(!room) return <Centered>{t("loadingRoom")}</Centered>;
  const me = players.find(p=>p.player_id===identity.playerId);
  const isHost = room.host_id===identity.playerId;
  const leaveAndHome = async ()=>{ await leaveRoom(code, identity.playerId); window.location.hash="/"; };
  if(room.status==="lobby"){
    return <Lobby code={code} room={room} players={players} me={me} isHost={isHost}
      onTeamRole={(team,role)=> setPlayerTeamRole(code, identity.playerId, team, role).then(refreshPlayers)}
      onStart={()=> updateRoomState(code, createGame(lang), "playing")}
      onLeave={leaveAndHome} identity={identity}/>;
  }
  return <PlayOnline code={code} room={room} me={me} isHost={isHost}
    onBackToLobby={()=> updateRoomState(code, room.state, "lobby")}
    onLeave={leaveAndHome} identity={identity}/>;
}

function RoomPage({code}){
  const { t, lang } = useSettings();
  const [identity,setIdentity]=useState(()=>getIdentity());
  const [creating,setCreating]=useState(false);
  useEffect(()=>{
    if(code!=="new" || !identity || creating) return;
    setCreating(true);
    createRoom(identity.playerId, lang)
      .then(nc=>{ window.location.replace(`#/room/${nc}`); })
      .catch(()=> setCreating(false));
  },[code, identity, creating, lang]);
  if(!identity) return <IdentityGate onReady={setIdentity}/>;
  if(code==="new") return <Centered>{t("creatingRoom")}</Centered>;
  return <RoomInner code={code} identity={identity}/>;
}

// ============ Router root ============
function App(){
  const [hash] = useHashRoute();
  const route = parseRoute(hash);
  // scroll top on route change
  useEffect(()=>{ window.scrollTo(0,0); },[hash]);
  if(route.name==="home") return <Landing/>;
  if(route.name==="play") return <PlayLocal/>;
  if(route.name==="terms") return <TermsPage/>;
  if(route.name==="room") return <RoomPage code={route.code}/>;
  return <Landing/>;
}

createRoot(document.getElementById('root')).render(
  <SettingsProvider><App/></SettingsProvider>
);
</script>
</body>
</html>
